<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Zero - ZeroChat</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <header class="topo">

            <div class="avatar">
                BZ
            </div>

            <div class="info">
                <h2>Base Zero</h2>
                <span>online</span>
            </div>

        </header>

        <main id="chat" class="chat"></main>

        <div class="barra">

            <input
                type="text"
                id="msg"
                placeholder="Digite uma mensagem..."
                autocomplete="off">

            <button onclick="enviar()">
                ➤
            </button>

        </div>

    </div>

    <footer>

        <div class="footer-logo">
            BASE ZERO
        </div>

        <p>
            © 2025 Base Zero. Todos os direitos reservados.
        </p>

        <p>
            Os materiais, identidade visual, logotipo,
            conteúdos e e-books pertencem à Base Zero.
        </p>

        <p>
            Site oficial:
            https://bio.site/basezero
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
